name: Generate DB

on:
  schedule:
    - cron: '0 0 1 * *'   # el día 1 de cada mes
  workflow_dispatch:       # permite ejecución manual desde Actions

concurrency:
  group: generate-db
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write      # necesario para hacer commit de CFGs y caché
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Datfiles already in repository
        run: echo "Usando datfiles locales en POPSManager.DBGenerator/Data/"

      # ──────────────────────────────────────────────
      # 1. Descargar CFGs y actualizarlos en el repo
      # ──────────────────────────────────────────────
      - name: Download and update OPL CFG Database
        run: |
          set -x
          echo "Intentando descargar la última versión de los CFG..."
          if wget -O cfg.zip "https://github.com/Tom-Bruise/PS2-OPL-CFG-Database/archive/refs/heads/master.zip" 2>/dev/null; then
            echo "✅ Descarga exitosa. Reemplazando CFGs locales..."
            rm -rf Data/cfg_database
            unzip -o cfg.zip
            mkdir -p Data/cfg_database
            cp -r PS2-OPL-CFG-Database-master/CFG_en/* Data/cfg_database/
            rm -rf PS2-OPL-CFG-Database-master cfg.zip

            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            
            git status
            git add Data/cfg_database/
            
            if git diff --staged --quiet; then
              echo "📁 No hay cambios en los CFGs."
            else
              echo "📁 Cambios detectados, haciendo commit de CFGs..."
              git commit -m "Actualización automática de CFGs [skip ci]"
              git push origin main || echo "⚠️ Push fallido (protección de rama o permisos). Los CFGs se usarán localmente en esta ejecución."
            fi
          else
            echo "⚠️ No se pudo descargar la fuente externa. Usando CFGs locales existentes."
          fi

      # ──────────────────────────────────────────────
      # 2. Generar URLs extra desde GameDB-PSX
      # ──────────────────────────────────────────────
      - name: Build extra URLs from GameDB-PSX
        run: |
          echo "Intentando descargar GameDB de GameDB-PSX..."
          if wget -O Data/gamedb_psx.json "https://github.com/niemasd/GameDB-PSX/releases/latest/download/PSX.data.json" 2>/dev/null; then
            python3 - << 'EOF'
          import json, os
          if not os.path.exists("Data/gamedb_psx.json"):
              print("No hay datos extra PS1.")
              exit(0)
          with open("Data/gamedb_psx.json", "r") as f:
              db = json.load(f)
          extra = {}
          for gameid, data in db.items():
              if "cover_url" in data:
                  extra[gameid.upper().replace("-","_")] = data["cover_url"]
          with open("Data/extra_urls.json", "w") as f:
              json.dump(extra, f, indent=2)
          print(f"Generado extra_urls.json con {len(extra)} URLs de PS1")
          EOF
          else
            echo "No se pudo descargar GameDB-PSX, se omite la ampliación de URLs."
          fi

      # ──────────────────────────────────────────────
      # 3. Ejecutar el generador (crea translation_cache.json)
      # ──────────────────────────────────────────────
      - name: Run generator
        run: dotnet run --project POPSManager.DBGenerator

      # ──────────────────────────────────────────────
      # 4. Subir la caché de traducción al repositorio
      # ──────────────────────────────────────────────
      - name: Commit translation cache
        run: |
          if [ -f Data/translation_cache.json ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add Data/translation_cache.json
            if git diff --staged --quiet; then
              echo "📁 No hay cambios en la caché de traducción."
            else
              echo "📁 Cambios detectados en la caché, haciendo commit..."
              git commit -m "Actualizar caché de traducción [skip ci]"
              git push origin main || echo "⚠️ Push fallido. La caché se usará localmente en esta ejecución."
            fi
          else
            echo "ℹ️ No se encontró translation_cache.json (posiblemente aún no se ha generado)."
          fi

      # ──────────────────────────────────────────────
      # 5. Validar JSON generados
      # ──────────────────────────────────────────────
      - name: Validate generated JSON
        run: |
          echo "Validando integridad de los JSON..."
          python3 - << 'EOF'
          import json, os, sys
          errors = []
          for f in ["Output/ps1db.json", "Output/ps2db.json"]:
              if not os.path.exists(f):
                  errors.append(f"Falta {f}")
                  continue
              with open(f, "r") as fh:
                  data = json.load(fh)
                  if not isinstance(data, dict):
                      errors.append(f"{f} no es un diccionario")
                  elif len(data) < 100:
                      errors.append(f"{f} tiene muy pocos juegos ({len(data)})")
          for f in ["Output/db/index.json"]:
              if not os.path.exists(f):
                  errors.append(f"Falta {f}")
                  continue
              with open(f, "r") as fh:
                  data = json.load(fh)
                  if not isinstance(data, dict) or len(data) < 100:
                      errors.append(f"Index inválido o con pocos juegos")
          if errors:
              print("Errores:", errors)
              sys.exit(1)
          print("✅ JSON válidos")
          EOF

      # ──────────────────────────────────────────────
      # 6. Publicar Release
      # ──────────────────────────────────────────────
      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-${{ github.run_number }}
          files: |
            POPSManager_DB.zip
            POPSManager_DB_individual.zip