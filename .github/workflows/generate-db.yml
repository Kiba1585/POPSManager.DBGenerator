name: Generate DB

on:
  schedule:
    - cron: '0 0 1 * *'   # primer día de cada mes
  workflow_dispatch:       # permite ejecución manual

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download Redump datfiles
        run: |
          mkdir -p Data
          wget -O Data/psx.dat "http://redump.org/datfile/psx/"
          wget -O Data/ps2.dat "http://redump.org/datfile/ps2/"

      - name: Download OPL CFG Database
        run: |
          wget -O opl-manager.zip "https://github.com/opl-manager/OPL-Manager/archive/refs/heads/main.zip"
          unzip opl-manager.zip
          mkdir -p Data/cfg_database
          # Ajusta la ruta si no existe client/CFG; a veces es directamente CFG/
          cp -r OPL-Manager-main/client/CFG/* Data/cfg_database/ 2>/dev/null || cp -r OPL-Manager-main/CFG/* Data/cfg_database/

      - name: Run generator
        run: dotnet run --project POPSManager.DBGenerator

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-${{ github.run_number }}
          files: POPSManager_DB.zip