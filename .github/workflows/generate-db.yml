name: Generate DB

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Download Redump datfiles
        run: |
          mkdir -p POPSManager.DBGenerator/Data
          wget -O POPSManager.DBGenerator/Data/psx.dat "http://redump.org/datfile/psx/"
          wget -O POPSManager.DBGenerator/Data/ps2.dat "http://redump.org/datfile/ps2/"

      - name: Download OPL CFG Database
  run: |
    wget -O opl-manager.zip "https://github.com/opl-manager/OPL-Manager/archive/refs/heads/main.zip"
    unzip opl-manager.zip
    mkdir -p POPSManager.DBGenerator/Data/cfg_database
    # Ruta dentro del ZIP (ajústala si es diferente, puede ser "OPL-Manager-main/CFG")
    cp -r OPL-Manager-main/client/CFG/* POPSManager.DBGenerator/Data/cfg_database/

      - name: Run generator
        run: dotnet run --project POPSManager.DBGenerator

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-${{ github.run_number }}
          files: POPSManager_DB.zip