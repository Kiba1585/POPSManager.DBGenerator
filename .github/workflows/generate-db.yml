name: Generate DB

on:
  schedule:
    - cron: '0 0 1 * *'   # el día 1 de cada mes
  workflow_dispatch:       # permite ejecución manual desde Actions

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      # Los datfiles ya están en el repositorio (Data/psx.dat y Data/ps2.dat)
      - name: Datfiles already in repository
        run: echo "Usando datfiles locales en POPSManager.DBGenerator/Data/"

      - name: Download OPL CFG Database
        run: |
          wget -O cfg.zip "https://github.com/Tom-Bruise/PS2-OPL-CFG-Database/archive/refs/heads/master.zip"
          unzip cfg.zip
          mkdir -p Data/cfg_database
          cp -r PS2-OPL-CFG-Database-master/CFG_en/* Data/cfg_database/

      - name: Run generator
        run: dotnet run --project POPSManager.DBGenerator

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: db-${{ github.run_number }}
          files: POPSManager_DB.zip